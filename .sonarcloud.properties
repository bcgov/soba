# I believe this is what BC Gov uses for their SonarCloud analysis (SonarCloud.properties)
# SonarCloud Code Analysis code coverage on check in.
# (Automatic Analysis reads this file — NOT sonar-project.properties, which is for
# the CI scanner. Only a limited set of path-based properties are supported here.)

# Files/paths excluded from analysis entirely (no issues or hotspots raised).
# Generated migrations and vendored/static assets — not hand-maintained source.
sonar.exclusions=frontend/public/**,backend/drizzle/**,deployments/**,**/*.min.css,**/*.min.js

# Classify test code as tests (analysed, but with test-appropriate rules).
sonar.tests=backend/tests,frontend/tests,integration
sonar.test.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts

# Don't demand coverage / duplicate-detection on tests or generated code.
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts
sonar.cpd.exclusions=backend/drizzle/**
