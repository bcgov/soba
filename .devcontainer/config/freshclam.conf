# Local-dev freshclam config for ghcr.io/bcgov/chefs-clamav. The image's baked-in
# mirror is the in-cluster BC Gov one (clamav-mirror.apps.silver.devops.gov.bc.ca),
# which only serves clients inside the cluster — off-cluster it returns empty replies.
# Point at ClamAV's public mirror instead. Paths/owner match the image (UBI /opt/app-root).
DatabaseDirectory /opt/app-root/src
DatabaseOwner clamupdate
DatabaseMirror database.clamav.net
LogTime yes
Foreground yes
