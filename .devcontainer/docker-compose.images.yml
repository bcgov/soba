# Run backend and frontend from images built with: make build
# Prerequisites: dev services running (postgres, mongo, formio), e.g.:
#   docker compose -f .devcontainer/docker-compose.yml up -d
# First-time DB: with Postgres up: cd backend && pnpm db:migrate && pnpm db:seed
#
# Env: backend uses backend/.env.example + backend/.env.local.example (DATABASE_URL overridden for Docker).
#      frontend uses frontend/.env.example.
# Paths below are relative to this file's directory (.devcontainer/).
name: soba-dev-images
services:
  backend:
    image: soba/backend:local
    ports:
      - "4000:4000"
    env_file:
      - ../backend/.env
      - ../backend/.env.local
    environment:
      DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/soba
      # Form.io sidecar runs in sibling compose (host :3001). localhost here is this container.
      PLUGIN_FORMIO_V5_API_BASE_URL: http://host.docker.internal:3001
      PLUGIN_FORMIO_V5_ADMIN_API_URL: http://host.docker.internal:3001
      PLUGIN_FORMIO_V5_RENDER_API_URL: http://host.docker.internal:3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    image: soba/frontend:local
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SOBA_API_BASE_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_SOBA_FEATURES_ALLOWED: all
      # SSR / RSC fetch from inside this container (not localhost — that is this container)
      SOBA_API_INTERNAL_URL: http://backend:4000/api/v1
    depends_on:
      - backend
    restart: unless-stopped
