be_image:
  repository: ghcr.io/example/backend
  tag: sha-deadbee
fe_image:
  repository: ghcr.io/example/frontend
  tag: sha-deadbee
sobaBEUrl: https://soba-pr-1-be.example.com
keycloakUrl: https://keycloak.example.com/auth
jwksUri: https://keycloak.example.com/certs
formioBaseUrl: https://formio.example.com
jwtSecret: test
sessionSecret: test
formio:
  password: test
formioManagerPassword: test
formioManagerUsername: test
crunchy:
  enabled: false
database:
  uri: postgresql://user:pass@host/db
fe_routes:
  - host: soba-pr-1.example.com
    service: soba-pr-1-fe
    targetPort: 3000
    wildcardPolicy: None
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
be_routes:
  - host: soba-pr-1-be.example.com
    service: soba-pr-1-be
    targetPort: 4000
    wildcardPolicy: None
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect