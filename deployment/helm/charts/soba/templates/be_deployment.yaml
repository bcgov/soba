apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ include "soba.fullname" . }}-be"
  labels:
    {{- include "soba.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "soba.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.database.secretChecksum }}
        checksum/secret-db: "{{ .Values.database.secretChecksum }}"
        {{- end }}
        {{- if .Values.appSecrets.secretChecksum }}
        checksum/secret-app: "{{ .Values.appSecrets.secretChecksum }}"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "soba.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "soba.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.be_image.repository }}:{{ .Values.be_image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.be_image.pullPolicy }}
          env:
            - name: "JWT_SECRET"
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appSecrets.secretName }}"
                  key: jwt-secret
            - name: "FORMIO_BASE_URL"
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appSecrets.secretName }}"
                  key: formio-base-url
            - name: "FORMIO_ADMIN_USERNAME"
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appSecrets.secretName }}"
                  key: formio-admin-username
            - name: "FORMIO_ADMIN_PASSWORD"
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appSecrets.secretName }}"
                  key: formio-admin-password
            - name: "FORMIO_MANAGER_USERNAME"
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appSecrets.secretName }}"
                  key: formio-manager-username
            - name: "FORMIO_MANAGER_PASSWORD"
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appSecrets.secretName }}"
                  key: formio-manager-password
            - name: "SESSION_SECRET"
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appSecrets.secretName }}"
                  key: session-secret
            - name: "JWKS_URI"
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appSecrets.secretName }}"
                  key: jwks-uri
            - name: "KEYCLOAK_URL"
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appSecrets.secretName }}"
                  key: keycloak-url
            - name: "JWT_ISSUER"
              value: "{{ .Values.jwtIssuer }}"
            - name: "JWT_AUDIENCE"
              value: "{{ .Values.jwtAudience }}"
            - name: "KEYCLOAK_CLIENT_ID"
              value: "{{ .Values.keycloakClientId }}"
            - name: "KEYCLOAK_REALM"
              value: "{{ .Values.keycloakRealm }}"
            - name: "ROLE_FIELD"
              value: "{{ .Values.roleField }}"
            - name: "NODE_ENV"
              value: "{{ .Values.nodeEnv }}"
            - name: "ADMIN_ROLE_NAME"
              value: "{{ .Values.adminRoleName }}"
            - name: "MANAGER_ROLE_NAME"
              value: "{{ .Values.managerRoleName }}"
            - name: "DATABASE_URL"
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.database.secretName }}"
                  key: uri
          ports:
            - name: http
              containerPort: {{ .Values.be_service.port }}
              protocol: TCP
          {{- with .Values.be_livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.be_readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
