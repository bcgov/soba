# Crunchy Postgres values for SOBA PR pipelines.
# Consumed by bcgov/action-crunchy; must be compatible with their chart (charts/crunchy).
# PR-specific user/database (app-<PR_NUMBER>) is added by the action at runtime.
global:
  config:
    dbName: app

crunchy:
  enabled: true
  postgresVersion: 18
  postGISVersion: "3.6"
  imagePullPolicy: IfNotPresent
  image: "artifacts.developer.gov.bc.ca/bcgov-docker-local/crunchy-postgres-gis:ubi9-18.1-3.6-2547"
  clone:
    enabled: false
  restore:
    enabled: false
  instances:
    name: db
    replicas: 1
    metadata:
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '9187'
    dataVolumeClaimSpec:
      storage: 512Mi
      storageClassName: netapp-block-standard
      walStorage: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi
    replicaCertCopy:
      requests:
        cpu: 1m
        memory: 32Mi
  # No backups for PRs — ephemeral environments; saves resources and storage.
  pgBackRest:
    enabled: false
    s3:
      enabled: false
  patroni:
    postgresql:
      pg_hba:
        - "host all all 10.0.0.0/8 scram-sha-256"
        - "host all all ::1/128 scram-sha-256"
      parameters:
        shared_buffers: 16MB
        wal_buffers: "64kB"
        min_wal_size: 32MB
        max_wal_size: 64MB
        max_slot_wal_keep_size: 128MB
        work_mem: 2MB
        log_min_duration_statement: 1000ms
        effective_io_concurrency: 20
  # No pgBouncer for PRs — direct connection to primary, minimal traffic.
  proxy:
    enabled: false
  pgmonitor:
    enabled: true
    exporter:
      requests:
        cpu: 10m
        memory: 32Mi
  users:
    - name: '{{ .Values.global.config.dbName }}'
      databases:
        - '{{ .Values.global.config.dbName }}'
      options: "CREATEDB"
    - name: 'postgres'
      databases:
        - 'postgres'
        - '{{ .Values.global.config.dbName }}'
