# Default configuration for the SOBA standalone MongoDB chart.
#
# Keep shared security and replica-set behaviour here. Environment overlays set
# only capacity, naming, and platform-specific integration values.

# -- global contains settings consumed by the Bitnami dependency.
global:
  # -- global.security permits the approved BC Gov GHCR image, which does not
  # use Bitnami's default registry naming convention.
  security:
    allowInsecureImages: true
  # -- global.compatibility enables OpenShift-compatible security contexts.
  compatibility:
    openshift:
      adaptSecurityContext: auto

# -- mongodb configures the Bitnami MongoDB dependency.
mongodb:
  # -- mongodb.enabled is false by default; each environment must opt in.
  enabled: false

  # -- mongodb.image defines the shared approved MongoDB runtime image.
  # Replace tag with a reviewed digest before production use.
  image:
    registry: ghcr.io
    repository: bcgov/bitnami-mongodb
    tag: 8.2.3
    pullPolicy: IfNotPresent

  # -- mongodb.architecture deploys a MongoDB replica set.
  architecture: replicaset
  # -- mongodb.replicaSetName is the MongoDB replica-set identifier.
  replicaSetName: rs0
  # -- mongodb.podManagementPolicy creates members sequentially during bootstrap.
  podManagementPolicy: OrderedReady
  # -- mongodb.updateStrategy performs StatefulSet rolling updates.
  updateStrategy:
    type: RollingUpdate
  # -- mongodb.terminationGracePeriodSeconds permits orderly member shutdown.
  terminationGracePeriodSeconds: 120

  # -- mongodb.auth enables chart-managed authentication without storing values
  # in Git. The dependency generates the Secret during first installation.
  auth:
    enabled: true
    rootUser: root
    usernames:
      - formio
    databases:
      - formio-ce
  # -- mongodb.usePasswordFiles mounts passwords as files rather than values.
  usePasswordFiles: true

  # -- mongodb.tls requires encrypted replica-set and client traffic.
  tls:
    enabled: true
    mode: requireTLS
    mTLS:
      enabled: false
    autoGenerated: true
  # -- mongodb.extraFlags supplies MongoDB 8.3 with the generated CA chain and
  # permits password-authenticated TLS clients without client certificates.
  extraFlags:
    - --tlsCAFile=/certs/mongodb-ca-cert
    - --tlsAllowConnectionsWithoutCertificates

  # -- mongodb.persistence keeps data across pod restarts and Helm uninstalls.
  persistence:
    accessModes:
      - ReadWriteOnce
    resourcePolicy: keep

  # -- mongodb.podAntiAffinityPreset prevents data members sharing a node.
  podAntiAffinityPreset: hard
  # -- mongodb.topologyKey is the node label used for pod placement.
  topologyKey: kubernetes.io/hostname
  # -- mongodb.topologySpreadConstraints requires balanced member placement.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: mongodb
          app.kubernetes.io/component: mongodb
  # -- mongodb.pdb permits no more than one voluntary member disruption.
  pdb:
    create: true
    maxUnavailable: 1

  # -- mongodb.serviceAccount disables unnecessary Kubernetes API credentials.
  serviceAccount:
    create: true
    automountServiceAccountToken: false
  automountServiceAccountToken: false
  # -- mongodb.podSecurityContext applies filesystem permissions to MongoDB pods.
  podSecurityContext:
    enabled: true
    fsGroupChangePolicy: OnRootMismatch
    fsGroup: 1001
  # -- mongodb.containerSecurityContext applies restricted container settings.
  containerSecurityContext:
    enabled: true
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  # -- mongodb.networkPolicy denies non-approved ingress and egress by default.
  networkPolicy:
    enabled: true
    allowExternal: false
    allowExternalEgress: false
    addExternalClientAccess: false

  # -- mongodb.metrics enables the MongoDB exporter sidecar.
  metrics:
    enabled: true
    collector:
      diagnosticdata: true
      replicasetstatus: true
