{{- if .Values.mongodb.internal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "soba.fullname" . }}-mongodb
  labels:
    {{- include "soba.labels" (dict "root" . "component" "mongodb") | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.mongodb.service.port }}
      targetPort: mongo
      protocol: TCP
      name: mongo
  selector:
    {{- include "soba.selectorLabels" (dict "root" . "component" "mongodb") | nindent 4 }}
{{- end }}
