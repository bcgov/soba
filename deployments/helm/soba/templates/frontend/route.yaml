{{- if .Values.frontend.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "soba.fullname" . }}-frontend
  labels:
    {{- include "soba.labels" (dict "root" . "component" "frontend") | nindent 4 }}
spec:
  host: {{ if .Values.global.routeHost }}{{ .Values.global.routeHost }}{{ else }}{{ include "soba.frontendHost" . }}{{ end }}
  {{- if .Values.global.routePath }}
  path: {{ .Values.global.routePath }}
  {{- end }}
  to:
    kind: Service
    name: {{ include "soba.fullname" . }}-frontend
    weight: 100
  port:
    targetPort: http
  tls:
    termination: {{ .Values.frontend.route.tls.termination }}
    insecureEdgeTerminationPolicy: {{ .Values.frontend.route.tls.insecureEdgeTerminationPolicy }}
  wildcardPolicy: None
{{- end }}
