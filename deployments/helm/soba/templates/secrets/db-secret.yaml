{{- $secretName := printf "%s-db" (include "soba.fullname" .) -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "soba.labels" (dict "root" . "component" "backend") | nindent 4 }}
  annotations:
    {{- include "soba.keepPolicy" . | nindent 4 }}
type: Opaque
data:
  {{- if $existingSecret }}
  {{- toYaml $existingSecret.data | nindent 2 }}
  {{- else }}
  {{- if .Values.database.uri }}
  DATABASE_URL: {{ .Values.database.uri | b64enc | quote }}
  {{- else }}
  DB_PASSWORD: {{ default (randAlphaNum 24) .Values.database.password | b64enc | quote }}
  {{- end }}
  {{- end }}
