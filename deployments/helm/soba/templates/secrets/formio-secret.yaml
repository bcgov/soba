{{- $secretName := printf "%s-formio" (include "soba.fullname" .) -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "soba.labels" (dict "root" . "component" "formio") | nindent 4 }}
  annotations:
    {{- include "soba.keepPolicy" . | nindent 4 }}
type: Opaque
data:
  {{- if $existingSecret }}
  {{- toYaml $existingSecret.data | nindent 2 }}
  {{- else }}
  {{- $adminPassword := default (randAlphaNum 24) .Values.formio.admin.password }}
  {{- $jwtSecret := default (randAlphaNum 32) .Values.formio.jwtSecret }}
  PLUGIN_FORMIO_V5_ADMIN_USERNAME: {{ .Values.formio.admin.email | b64enc | quote }}
  PLUGIN_FORMIO_V5_ADMIN_PASSWORD: {{ $adminPassword | b64enc | quote }}
  ROOT_EMAIL: {{ .Values.formio.admin.email | b64enc | quote }}
  ROOT_PASSWORD: {{ $adminPassword | b64enc | quote }}
  FORMIO_JWT_SECRET: {{ $jwtSecret | b64enc | quote }}
  NODE_CONFIG: {{ printf "{\"mongo\":%s,\"port\":%v,\"jwt\":{\"secret\":%s},\"reservedForms\":[\"submissions\",\"submission\",\"exists\",\"export\",\"role\",\"current\",\"logout\",\"import\",\"form\",\"access\",\"health\"]}" (include "soba.mongodbUri" . | toJson) (.Values.formio.service.port) ($jwtSecret | toJson) | b64enc | quote }}
  {{- end }}
