{{- $ow := .Values.outboxWorker | default dict }}
{{- $owEnabled := true }}
{{- if hasKey $ow "enabled" }}{{ $owEnabled = index $ow "enabled" }}{{ end }}
{{- if $owEnabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "soba.fullname" . }}-outbox-worker
  labels:
    {{- include "soba.labels" (dict "root" . "component" "outbox-worker") | nindent 4 }}
spec:
  replicas: {{ .Values.outboxWorker.replicas }}
  selector:
    matchLabels:
      {{- include "soba.selectorLabels" (dict "root" . "component" "outbox-worker") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config-app: {{ include (print $.Template.BasePath "/backend/configmap-app.yaml") . | sha256sum }}
        checksum/config-formio: {{ include (print $.Template.BasePath "/backend/configmap-formio.yaml") . | sha256sum }}
        checksum/config-sso: {{ include (print $.Template.BasePath "/backend/configmap-sso.yaml") . | sha256sum }}
        checksum/config-ratelimit: {{ include (print $.Template.BasePath "/backend/configmap-ratelimit.yaml") . | sha256sum }}
        checksum/secret-db: {{ include (print $.Template.BasePath "/secrets/db-secret.yaml") . | sha256sum }}
        checksum/secret-formio: {{ include (print $.Template.BasePath "/secrets/formio-secret.yaml") . | sha256sum }}
      labels:
        {{- include "soba.selectorLabels" (dict "root" . "component" "outbox-worker") | nindent 8 }}
    spec:
      containers:
        - name: outbox-worker
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command:
            - node
            - backend/dist/src/core/workers/outboxWorker.js
          envFrom:
            - configMapRef:
                name: {{ include "soba.fullname" . }}-backend-app
            - configMapRef:
                name: {{ include "soba.fullname" . }}-backend-formio
            - configMapRef:
                name: {{ include "soba.fullname" . }}-backend-sso
            - configMapRef:
                name: {{ include "soba.fullname" . }}-backend-ratelimit
            - secretRef:
                name: {{ include "soba.fullname" . }}-db
            - secretRef:
                name: {{ include "soba.fullname" . }}-formio
          {{- if .Values.outboxWorker.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test -f /app/backend/dist/src/core/workers/outboxWorker.js
            initialDelaySeconds: {{ .Values.outboxWorker.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.outboxWorker.livenessProbe.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.outboxWorker.resources | nindent 12 }}
{{- end }}
