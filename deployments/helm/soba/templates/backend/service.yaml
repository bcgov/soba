apiVersion: v1
kind: Service
metadata:
  name: {{ include "soba.fullname" . }}-backend
  labels:
    {{- include "soba.labels" (dict "root" . "component" "backend") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "soba.selectorLabels" (dict "root" . "component" "backend") | nindent 4 }}
