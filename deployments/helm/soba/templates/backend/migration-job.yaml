{{- if .Values.backend.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "soba.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "soba.labels" (dict "root" . "component" "backend") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    # Pipeline performance fix: Revert if needed.
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    # Pipeline performance fix: Revert if needed.
spec:
  backoffLimit: 3
  activeDeadlineSeconds: {{ .Values.backend.migration.activeDeadlineSeconds }}
  # Pipeline performance fix: Revert if needed.
  ttlSecondsAfterFinished: 3600
  # Pipeline performance fix: Revert if needed.
  template:
    metadata:
      labels:
        {{- include "soba.selectorLabels" (dict "root" . "component" "migrate") | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          workingDir: /app/backend
          command: ["sh", "-c"]
          args:
            - |
              node dist/src/core/db/migrate.js && node dist/src/core/db/seed.js
          env:
            - name: LOG_LEVEL
              value: {{ .Values.backend.config.logLevel | quote }}
            - name: NODE_ENV
              value: {{ .Values.backend.config.nodeEnv | quote }}
            {{- if .Values.database.existingSecretName }}
            # Pipeline performance fix: Revert if needed.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "soba.dbSecretName" . }}
                  key: {{ include "soba.dbSecretKey" . }}
            # Pipeline performance fix: Revert if needed.
            {{- else }}
            {{- if .Values.database.uri }}
            - name: DATABASE_URL
              value: {{ .Values.database.uri | quote }}
            {{- else }}
            - name: DB_HOST
              value: {{ .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_USER
              value: {{ .Values.database.user | quote }}
            - name: DB_NAME
              value: {{ .Values.database.name | quote }}
            - name: DB_PASSWORD
              value: {{ .Values.database.password | quote }}
            {{- end }}
            {{- end }}
            - name: DB_ADMIN_DATABASE
              value: {{ .Values.database.adminDatabase | quote }}
            # Pipeline performance fix: Revert if needed.
            - name: DB_CONNECTION_TIMEOUT_MS
              value: {{ .Values.database.connectionTimeoutMs | quote }}
            - name: DB_QUERY_TIMEOUT_MS
              value: {{ .Values.database.queryTimeoutMs | quote }}
            - name: DB_STATEMENT_TIMEOUT_MS
              value: {{ .Values.database.statementTimeoutMs | quote }}
            - name: DB_LOCK_TIMEOUT_MS
              value: {{ .Values.database.lockTimeoutMs | quote }}
            - name: DB_MIGRATION_READY_ATTEMPTS
              value: {{ .Values.database.migrationReadyAttempts | quote }}
            - name: DB_MIGRATION_READY_SLEEP_MS
              value: {{ .Values.database.migrationReadySleepMs | quote }}
            # Pipeline performance fix: Revert if needed.
            - name: SOBA_SYSTEM_SUBJECT
              value: {{ .Values.backend.config.sobaSystemSubject | quote }}
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
{{- end }}
