apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "soba.fullname" . }}-backend-app
  labels:
    {{- include "soba.labels" (dict "root" . "component" "backend") | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.backend.config.logLevel | quote }}
  NODE_ENV: {{ .Values.backend.config.nodeEnv | quote }}
  {{- $frontendOrigin := printf "https://%s" (include "soba.frontendHost" .) }}
  CORS_ORIGIN: {{ .Values.backend.config.corsOrigin | default $frontendOrigin | quote }}
  {{- $backendApiBase := printf "https://%s/api/v1" (include "soba.backendHost" .) }}
  SOBA_API_BASE_URL: {{ .Values.backend.config.sobaApiBaseUrl | default $backendApiBase | quote }}
  {{- if .Values.backend.config.gitSha }}
  GIT_SHA: {{ .Values.backend.config.gitSha | quote }}
  {{- end }}
  {{- if .Values.backend.config.gitTag }}
  GIT_TAG: {{ .Values.backend.config.gitTag | quote }}
  {{- end }}
  {{- if .Values.backend.config.imageTag }}
  IMAGE_TAG: {{ .Values.backend.config.imageTag | quote }}
  {{- end }}
  FORM_ENGINE_DEFAULT_CODE: {{ .Values.backend.config.formEngineDefaultCode | quote }}
  CACHE_DEFAULT_CODE: {{ .Values.backend.config.cacheDefaultCode | quote }}
  MESSAGEBUS_DEFAULT_CODE: {{ .Values.backend.config.messagebusDefaultCode | quote }}
  SOBA_SYSTEM_SUBJECT: {{ .Values.backend.config.sobaSystemSubject | quote }}
  WORKSPACE_PLUGINS_ALLOWED: {{ .Values.backend.config.workspacePluginsAllowed | quote }}
  WORKSPACE_PLUGINS_STRICT_MODE: {{ .Values.backend.config.workspacePluginsStrictMode | quote }}
  PLUGIN_ENTERPRISE_CSTAR_HEADER_KEYS: {{ .Values.backend.config.pluginEnterpriseCstarHeaderKeys | quote }}
  PLUGIN_ENTERPRISE_CSTAR_REQUIRE_EXTERNAL_HEADER: {{ .Values.backend.config.pluginEnterpriseCstarRequireExternalHeader | quote }}
  PLUGIN_PERSONAL_LOCAL_COOKIE_KEY: {{ .Values.backend.config.pluginPersonalLocalCookieKey | quote }}
  PLUGIN_PERSONAL_LOCAL_ALLOW_HEADER_OVERRIDE: {{ .Values.backend.config.pluginPersonalLocalAllowHeaderOverride | quote }}
  {{- if not .Values.database.uri }}
  DB_HOST: {{ .Values.database.host | quote }}
  DB_PORT: {{ .Values.database.port | quote }}
  DB_USER: {{ .Values.database.user | quote }}
  DB_NAME: {{ .Values.database.name | quote }}
  {{- end }}
  DB_ADMIN_DATABASE: {{ .Values.database.adminDatabase | quote }}
  DB_POOL_MAX: {{ .Values.database.poolMax | quote }}
  # Pipeline performance fix: Revert if needed.
  DB_CONNECTION_TIMEOUT_MS: {{ .Values.database.connectionTimeoutMs | quote }}
  DB_QUERY_TIMEOUT_MS: {{ .Values.database.queryTimeoutMs | quote }}
  DB_STATEMENT_TIMEOUT_MS: {{ .Values.database.statementTimeoutMs | quote }}
  DB_LOCK_TIMEOUT_MS: {{ .Values.database.lockTimeoutMs | quote }}
  DB_MIGRATION_READY_ATTEMPTS: {{ .Values.database.migrationReadyAttempts | quote }}
  DB_MIGRATION_READY_SLEEP_MS: {{ .Values.database.migrationReadySleepMs | quote }}
  # Pipeline performance fix: Revert if needed.
