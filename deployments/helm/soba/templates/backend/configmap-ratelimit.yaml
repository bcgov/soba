apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "soba.fullname" . }}-backend-ratelimit
  labels:
    {{- include "soba.labels" (dict "root" . "component" "backend") | nindent 4 }}
data:
  RATE_LIMIT_WINDOW_MS: {{ .Values.backend.rateLimit.windowMs | quote }}
  RATE_LIMIT_MAX: {{ .Values.backend.rateLimit.max | quote }}
  RATE_LIMIT_API_WINDOW_MS: {{ .Values.backend.rateLimit.apiWindowMs | quote }}
  RATE_LIMIT_API_MAX: {{ .Values.backend.rateLimit.apiMax | quote }}
  RATE_LIMIT_PUBLIC_WINDOW_MS: {{ .Values.backend.rateLimit.publicWindowMs | quote }}
  RATE_LIMIT_PUBLIC_MAX: {{ .Values.backend.rateLimit.publicMax | quote }}
