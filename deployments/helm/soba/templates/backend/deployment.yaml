apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "soba.fullname" . }}-backend
  labels:
    {{- include "soba.labels" (dict "root" . "component" "backend") | nindent 4 }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "soba.selectorLabels" (dict "root" . "component" "backend") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config-app: {{ include (print $.Template.BasePath "/backend/configmap-app.yaml") . | sha256sum }}
        checksum/config-formio: {{ include (print $.Template.BasePath "/backend/configmap-formio.yaml") . | sha256sum }}
        checksum/config-sso: {{ include (print $.Template.BasePath "/backend/configmap-sso.yaml") . | sha256sum }}
        checksum/config-ratelimit: {{ include (print $.Template.BasePath "/backend/configmap-ratelimit.yaml") . | sha256sum }}
        checksum/secret-db: {{ include (print $.Template.BasePath "/secrets/db-secret.yaml") . | sha256sum }}
        {{- if not .Values.vault.enabled }}
        checksum/secret-formio: {{ include (print $.Template.BasePath "/secrets/formio-secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.vault.enabled }}
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/auth-path: {{ .Values.vault.authPath | quote }}
        vault.hashicorp.com/namespace: {{ .Values.vault.namespace | quote }}
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-requests-cpu: '10m'
        vault.hashicorp.com/agent-limits-cpu: '50m'
        vault.hashicorp.com/agent-requests-mem: '25Mi'
        vault.hashicorp.com/agent-limits-mem: '75Mi'
        vault.hashicorp.com/error-on-missing-key-soba-formio: 'true'
        vault.hashicorp.com/agent-inject-secret-soba-formio: {{ .Values.vault.secretPath | quote }}
        vault.hashicorp.com/agent-inject-template-soba-formio: |
          {{`{{- with secret "`}}{{ .Values.vault.secretPath }}{{`" }}`}}
          {{`export ROOT_PASSWORD="{{ .Data.data.FORMIO_ADMIN_PASSWORD }}"`}}
          {{`export PLUGIN_FORMIO_V5_ADMIN_PASSWORD="{{ .Data.data.FORMIO_ADMIN_PASSWORD }}"`}}
          {{`export FORMIO_JWT_SECRET="{{ .Data.data.FORMIO_JWT_SECRET }}"`}}
          {{`{{- end }}`}}
        vault.hashicorp.com/error-on-missing-key-soba-cdogs: 'true'
        vault.hashicorp.com/agent-inject-secret-soba-cdogs: {{ .Values.vault.secretPath | quote }}
        vault.hashicorp.com/agent-inject-template-soba-cdogs: |
          {{`{{- with secret "`}}{{ .Values.vault.secretPath }}{{`" }}`}}
          {{`export PLUGIN_CDOGS_V2_CLIENT_ID="{{ .Data.data.PLUGIN_CDOGS_V2_CLIENT_ID }}"`}}
          {{`export PLUGIN_CDOGS_V2_CLIENT_SECRET="{{ .Data.data.PLUGIN_CDOGS_V2_CLIENT_SECRET }}"`}}
          {{`{{- end }}`}}
        {{- end }}
      labels:
        {{- include "soba.selectorLabels" (dict "root" . "component" "backend") | nindent 8 }}
    spec:
      {{- if .Values.vault.enabled }}
      serviceAccountName: {{ .Values.vault.serviceAccountName | quote }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
              protocol: TCP
          {{- if .Values.vault.enabled }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              . /vault/secrets/soba-formio
              . /vault/secrets/soba-cdogs
              exec node backend/dist/src/app.js
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "soba.fullname" . }}-backend-app
            - configMapRef:
                name: {{ include "soba.fullname" . }}-backend-formio
            - configMapRef:
                name: {{ include "soba.fullname" . }}-backend-sso
            - configMapRef:
                name: {{ include "soba.fullname" . }}-backend-ratelimit
            - configMapRef:
                name: {{ include "soba.fullname" . }}-backend-storage
            {{- if not .Values.database.existingSecretName }}
            - secretRef:
                name: {{ include "soba.fullname" . }}-db
            {{- end }}
            {{- if not .Values.vault.enabled }}
            - secretRef:
                name: {{ include "soba.fullname" . }}-formio
            {{- end }}
          {{- if .Values.database.existingSecretName }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "soba.dbSecretName" . }}
                  key: {{ include "soba.dbSecretKey" . }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.readinessProbe.timeoutSeconds }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          {{- if include "soba.tempStorageUsesMount" . }}
          volumeMounts:
            - name: app-tmp
              mountPath: {{ .Values.backend.tempStorage.mountPath }}
          {{- end }}
      {{- if include "soba.tempStorageUsesMount" . }}
      volumes:
        - name: app-tmp
          persistentVolumeClaim:
            claimName: {{ include "soba.fullname" . }}-backend-tmp
      {{- end }}
