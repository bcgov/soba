{{- if .Values.formio.internal.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "soba.fullname" . }}-formio
  labels:
    {{- include "soba.labels" (dict "root" . "component" "formio") | nindent 4 }}
spec:
  replicas: {{ .Values.formio.replicas }}
  selector:
    matchLabels:
      {{- include "soba.selectorLabels" (dict "root" . "component" "formio") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/formio/configmap.yaml") . | sha256sum }}
        {{- if not .Values.vault.enabled }}
        checksum/secret: {{ include (print $.Template.BasePath "/secrets/formio-secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.vault.enabled }}
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/auth-path: {{ .Values.vault.authPath | quote }}
        vault.hashicorp.com/namespace: {{ .Values.vault.namespace | quote }}
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-requests-cpu: '10m'
        vault.hashicorp.com/agent-limits-cpu: '50m'
        vault.hashicorp.com/agent-requests-mem: '25Mi'
        vault.hashicorp.com/agent-limits-mem: '75Mi'
        vault.hashicorp.com/error-on-missing-key-soba-formio: 'true'
        vault.hashicorp.com/agent-inject-secret-soba-formio: {{ .Values.vault.secretPath | quote }}
        vault.hashicorp.com/agent-inject-template-soba-formio: |
          {{`{{- with secret "`}}{{ .Values.vault.secretPath }}{{`" }}`}}
          {{`export ROOT_PASSWORD="{{ .Data.data.FORMIO_ADMIN_PASSWORD }}"`}}
          {{`export PLUGIN_FORMIO_V5_ADMIN_PASSWORD="{{ .Data.data.FORMIO_ADMIN_PASSWORD }}"`}}
          {{`export FORMIO_JWT_SECRET="{{ .Data.data.FORMIO_JWT_SECRET }}"`}}
          {{`{{- end }}`}}
        {{- end }}
      labels:
        {{- include "soba.selectorLabels" (dict "root" . "component" "formio") | nindent 8 }}
    spec:
      {{- if .Values.vault.enabled }}
      serviceAccountName: {{ .Values.vault.serviceAccountName | quote }}
      {{- end }}
      {{- if and .Values.formio.internal.enabled .Values.mongodb.internal.enabled }}
      initContainers:
        - name: wait-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              MONGODB_HOST="{{ include "soba.fullname" . }}-mongodb"
              MONGODB_PORT="{{ .Values.mongodb.service.port }}"
              echo "Waiting for MongoDB at ${MONGODB_HOST}:${MONGODB_PORT}..."
              until nc -z "$MONGODB_HOST" "$MONGODB_PORT"; do
                echo "MongoDB not ready, retrying in 2s..."
                sleep 2
              done
              echo "MongoDB is ready."
      {{- end }}
      containers:
        - name: formio
          image: "{{ .Values.formio.image.repository }}:{{ .Values.formio.image.tag }}"
          imagePullPolicy: {{ .Values.formio.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.formio.service.port }}
              protocol: TCP
          {{- if .Values.vault.enabled }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              . /vault/secrets/soba-formio
              export JWT_SECRET="$FORMIO_JWT_SECRET"
              export ROOT_EMAIL="{{ .Values.formio.admin.email }}"
              export MONGO="{{ include "soba.mongodbUri" . }}"
              exec node --no-node-snapshot main
          envFrom:
            - configMapRef:
                name: {{ include "soba.fullname" . }}-formio
          {{- else }}
          envFrom:
            - configMapRef:
                name: {{ include "soba.fullname" . }}-formio
            - secretRef:
                name: {{ include "soba.fullname" . }}-formio
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.formio.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.formio.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.formio.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.formio.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.formio.readinessProbe.timeoutSeconds }}
          resources:
            {{- toYaml .Values.formio.resources | nindent 12 }}
{{- end }}
