# PR environment — minimal resources, single replica, internal Form.io + MongoDB
backend:
  replicas: 1
  # TEMP (revert before merge to develop): mount to exercise the PVC path in this
  # PR. Normally PRs use tempstorage-os (single replica, no shared PVC).
  config:
    tempStorageDefaultCode: tempstorage-mount
  sso:
    jwksUri: https://dev.loginproxy.gov.bc.ca/auth/realms/standard/protocol/openid-connect/certs
    jwtIssuer: https://dev.loginproxy.gov.bc.ca/auth/realms/standard
    jwtAudience: connected-services-submit-6349
  migration:
    activeDeadlineSeconds: 600
  readinessProbe:
    initialDelaySeconds: 30
    timeoutSeconds: 10
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi
  autoscaling:
    enabled: false

frontend:
  replicas: 1
  readinessProbe:
    initialDelaySeconds: 25
    timeoutSeconds: 10
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi
  autoscaling:
    enabled: false

formio:
  internal:
    enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi
  # Formio depends on MongoDB; allow time for MongoDB to be ready after PR deploy
  readinessProbe:
    initialDelaySeconds: 45
    timeoutSeconds: 10
  livenessProbe:
    initialDelaySeconds: 60

mongodb:
  internal:
    enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi
  persistence:
    size: 1Gi
    
temporal:
  allowed: "true"
  address: ""
  namespace: "default"
  taskQueue: "soba"

temporalWorker:
  enabled: true
  image:
    repository: ghcr.io/bcgov/soba/temporal-worker
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 512Mi

vault:
  enabled: true
  role: acf456-nonprod
  secretPath: acf456-nonprod/soba-dev
  serviceAccountName: acf456-vault
