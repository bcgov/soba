# Dev environment — single replica, moderate resources
backend:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi
  config:
    logLevel: debug
    nodeEnv: development

frontend:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi

formio:
  internal:
    enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi

mongodb:
  internal:
    enabled: true
  replicas: 1
  persistence:
    size: 1Gi

temporal:
  allowed: "true"
  address: ""
  namespace: "soba-dev"
  taskQueue: "soba"

temporalWorker:
  enabled: true
  image:
    repository: ghcr.io/bcgov/soba/temporal-worker
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  
vault:
  enabled: true
  role: acf456-nonprod
  secretPath: acf456-nonprod/soba-dev
  serviceAccountName: acf456-vault
