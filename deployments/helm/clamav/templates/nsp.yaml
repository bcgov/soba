{{- if .Values.nsp.create }}
# Allow clamd ingress (3310) from pods in the same namespace only. clamav is
# per-namespace shared infra (the soba backend reaches it in-namespace via the
# soba-clamav ExternalName alias), so the namespace is the trust boundary. This
# is required under a default-deny namespace, where clamd would otherwise get no
# ingress at all.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "clamav.fullname" . }}-allow-clamd
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clamav.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "clamav.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Empty podSelector = any pod in this namespace.
        - podSelector: {}
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
{{- end }}
