# Triggers when a PR is merged to the develop branch.
name: On Merge
run-name: Deploy to Dev

env:
  ACRONYM: soba

on:
  push:
    branches: [develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/on-merge.yaml"
      - ".github/workflows/build-images.yaml"
      - ".gitignore"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "deployments/**"

permissions: {}

concurrency:
  group: openshift-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build & Push
    uses: ./.github/workflows/build-images.yaml
    with:
      ref: develop
      platforms: amd64
      image_version: develop
    secrets: inherit
    permissions:
      contents: read
      packages: write

  deploy-crunchy:
    name: Deploy Crunchy Postgres
    runs-on: ubuntu-latest
    outputs:
      cluster: ${{ steps.crunchy.outputs.cluster }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy Crunchy
        id: crunchy
        uses: bcgov/action-crunchy@v2.0.0
        with:
          oc_namespace: ${{ secrets.OC_NAMESPACE }}
          oc_token: ${{ secrets.OC_TOKEN }}
          values_file: deployments/helm/action-crunchy/values.yml
          release_name: pg-soba
          ref: v2.0.0

  deploy:
    name: Deploy SOBA to Dev
    needs: [build, deploy-crunchy]
    permissions:
      contents: read
    environment:
      name: dev
      url: https://soba-dev.${{ vars.OC_DOMAIN }}
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4.14"

      - name: Login to OpenShift Cluster
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ vars.OC_SERVER }}
          openshift_token: ${{ secrets.OC_TOKEN }}
          insecure_skip_tls_verify: true
          namespace: ${{ secrets.OC_NAMESPACE }}

      - name: Get DB config from Crunchy secret
        id: db
        env:
          NAMESPACE: ${{ secrets.OC_NAMESPACE }}
          CLUSTER: ${{ needs.deploy-crunchy.outputs.cluster }}
        run: |
          SECRET_NAME="${CLUSTER}-pguser-app"
          echo "secret_name=$SECRET_NAME" >> "$GITHUB_OUTPUT"

      # Pipeline performance fix: Revert if needed.
      - name: Wait for dev database readiness
        uses: ./.github/actions/wait-for-postgres
        with:
          secret_name: ${{ steps.db.outputs.secret_name }}
          namespace: ${{ secrets.OC_NAMESPACE }}
          label: dev database
      # Pipeline performance fix: Revert if needed.

      - name: Generate values override and deploy
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          NAMESPACE: ${{ secrets.OC_NAMESPACE }}
          TAG: sha-${{ needs.build.outputs.short_sha }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          DOMAIN: ${{ vars.OC_DOMAIN }}
        run: |
          REPO_LC=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')

          cat > /tmp/values-override.yaml <<OVERRIDE
          backend:
            image:
              repository: "ghcr.io/${REPO_LC}/backend"
              tag: "${TAG}"
            config:
              gitSha: "${SHORT_SHA}"
              gitTag: "${TAG}"
              imageTag: "${TAG}"
          frontend:
            image:
              repository: "ghcr.io/${REPO_LC}/frontend"
              tag: "${TAG}"
          global:
            domain: "${DOMAIN}"
          database:
            existingSecretName: "${{ steps.db.outputs.secret_name }}"
            existingSecretKey: "uri"
          OVERRIDE

          # Pipeline performance fix: Revert if needed.
          helm upgrade --install "soba-dev" ./deployments/helm/soba \
            --namespace "${NAMESPACE}" \
            --wait \
            --wait-for-jobs \
            --timeout 660s \
            -f deployments/helm/soba/values-dev.yaml \
            -f /tmp/values-override.yaml
          # Pipeline performance fix: Revert if needed.

          REVISION=$(helm status "soba-dev" -n "${NAMESPACE}" -o json | jq -r '.version')
          # Clean up old migration jobs and keep only current revision
          oc get jobs -n "${NAMESPACE}" -o name \
            | grep "soba-dev-migrate-" \
            | grep -v -- "-migrate-${REVISION}$" \
            | xargs -r oc delete -n "${NAMESPACE}" 2>/dev/null || true

          echo "Waiting for backend rollout..."
          oc rollout status deployment/soba-dev-backend -n "${NAMESPACE}" --timeout=300s

          echo "Waiting for frontend rollout..."
          oc rollout status deployment/soba-dev-frontend -n "${NAMESPACE}" --timeout=300s

          echo "Waiting for formio rollout..."
          oc rollout status deployment/soba-dev-formio -n "${NAMESPACE}" --timeout=300s

          echo "Waiting for mongodb rollout..."
          oc rollout status statefulset/soba-dev-mongodb -n "${NAMESPACE}" --timeout=300s

      # Pipeline performance fix: Revert if needed.
      - name: Deployment diagnostics
        if: failure()
        uses: ./.github/actions/openshift-diagnostics
        with:
          release: soba-dev
          namespace: ${{ secrets.OC_NAMESPACE }}
          database_secret_name: ${{ steps.db.outputs.secret_name }}
      # Pipeline performance fix: Revert if needed.

  Tests:
    name: Integration Tests
    needs: [deploy]
    uses: ./.github/workflows/playwright.yaml
    with:
      DEP_ENV: dev
      pr_branch: develop
    secrets:
      Username: ${{ secrets.keycloakUsername }}
      Password: ${{ secrets.keycloakPassword }}
      MFA_CODE: ${{ secrets.MFA_CODE }}
