---
name: Deploy Crunchy UAT

on:
  # A database-labelled PR may deploy Crunchy before the application workflow.
  # `labeled` supports adding the label after PR creation; `opened` supports a
  # label selected before creating the PR.
  pull_request:
    branches: [main]
    types: [opened, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crunchy-uat-db
  cancel-in-progress: false

jobs:
  deploy-crunchy-uat:
    name: Deploy Crunchy UAT
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'deploy-uat-db')
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment:
      name: uat-db
    outputs:
      release: ${{ steps.deploy.outputs.release }}
      cluster: ${{ steps.deploy.outputs.cluster }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy Crunchy UAT
        id: deploy
        uses: ./.github/actions/deploy-crunchy-uat
        with:
          oc_namespace: ${{ secrets.OC_NAMESPACE }}
          oc_token: ${{ secrets.OC_TOKEN }}
          oc_server: ${{ vars.OC_SERVER }}
          release_name: pg-soba
          values_file: deployments/helm/action-crunchy/values-uat.yml
