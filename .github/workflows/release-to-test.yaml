# Deploy release branches to the OpenShift test environment.
name: Release to Test
run-name: Deploy ${{ github.event.inputs.release_branch || github.ref_name }} to Test

env:
  ACRONYM: soba
  OC_VERSION: "4.14"

on:
  push:
    branches:
      - "release/sprint-*"
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/release-to-test.yaml"
      - ".github/workflows/build-images.yaml"
      - ".github/workflows/playwright.yaml"
      - "integration/playwright/"
      - ".gitignore"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "deployments/**"
  workflow_dispatch:
    inputs:
      release_branch:
        description: "Release branch to deploy, for example release/sprint-30"
        required: true
        type: string

permissions: {}

concurrency:
  group: openshift-test
  cancel-in-progress: false

jobs:
  set-vars:
    name: Set release variables
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      ref: ${{ steps.vars.outputs.ref }}
      branch: ${{ steps.vars.outputs.branch }}
      image_version: ${{ steps.vars.outputs.image_version }}
    steps:
      - name: Validate release branch
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH="${{ github.event.inputs.release_branch }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          if ! echo "$BRANCH" | grep -Eq '^release/sprint-[0-9]+$'; then
            echo "Branch '$BRANCH' does not match release/sprint-xxx."
            exit 1
          fi

          IMAGE_VERSION=$(echo "$BRANCH" | tr '/' '-')

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "ref=refs/heads/$BRANCH" >> "$GITHUB_OUTPUT"
          echo "image_version=$IMAGE_VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build & Push
    uses: ./.github/workflows/build-images.yaml
    needs: [set-vars]
    with:
      ref: ${{ needs.set-vars.outputs.ref }}
      platforms: amd64
      image_version: ${{ needs.set-vars.outputs.image_version }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

  deploy-crunchy:
    name: Deploy Crunchy Postgres
    needs: [set-vars]
    environment:
      name: test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      cluster: ${{ steps.crunchy.outputs.cluster }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.set-vars.outputs.ref }}

      - name: Deploy Crunchy
        id: crunchy
        uses: bcgov/action-crunchy@v2.0.0
        with:
          oc_namespace: ${{ secrets.OC_NAMESPACE }}
          oc_token: ${{ secrets.OC_TOKEN }}
          values_file: deployments/helm/action-crunchy/values.yml
          release_name: pg-soba
          ref: v2.0.0

  deploy:
    name: Deploy SOBA to Test
    needs: [set-vars, build, deploy-crunchy]
    permissions:
      contents: read
    environment:
      name: test
      url: https://${{ env.ACRONYM }}-test.${{ vars.OC_DOMAIN }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.set-vars.outputs.ref }}

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: ${{ env.OC_VERSION }}

      - name: Login to OpenShift Cluster
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ vars.OC_SERVER }}
          openshift_token: ${{ secrets.OC_TOKEN }}
          insecure_skip_tls_verify: true
          namespace: ${{ secrets.OC_NAMESPACE }}

      - name: Get DB config from Crunchy secret
        id: db
        env:
          NAMESPACE: ${{ secrets.OC_NAMESPACE }}
          CLUSTER: ${{ needs.deploy-crunchy.outputs.cluster }}
        run: |
          SECRET_NAME="${CLUSTER}-pguser-app"
          echo "secret_name=$SECRET_NAME" >> "$GITHUB_OUTPUT"

      # Pipeline performance fix: Revert if needed.
      - name: Wait for test database readiness
        uses: ./.github/actions/wait-for-postgres
        with:
          secret_name: ${{ steps.db.outputs.secret_name }}
          namespace: ${{ secrets.OC_NAMESPACE }}
          label: test database
      # Pipeline performance fix: Revert if needed.

      - name: Generate values override and deploy
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          NAMESPACE: ${{ secrets.OC_NAMESPACE }}
          TAG: sha-${{ needs.build.outputs.short_sha }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          DOMAIN: ${{ vars.OC_DOMAIN }}
        run: |
          REPO_LC=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')

          cat > /tmp/values-override.yaml <<OVERRIDE
          backend:
            image:
              repository: "ghcr.io/${REPO_LC}/backend"
              tag: "${TAG}"
            config:
              gitSha: "${SHORT_SHA}"
              gitTag: "${TAG}"
              imageTag: "${TAG}"
          frontend:
            image:
              repository: "ghcr.io/${REPO_LC}/frontend"
              tag: "${TAG}"
          global:
            domain: "${DOMAIN}"
          database:
            existingSecretName: "${{ steps.db.outputs.secret_name }}"
            existingSecretKey: "uri"
          OVERRIDE

          # Pipeline performance fix: Revert if needed.
          helm upgrade --install "soba-test" ./deployments/helm/soba \
            --namespace "${NAMESPACE}" \
            --wait \
            --wait-for-jobs \
            --timeout 660s \
            -f deployments/helm/soba/values-test.yaml \
            -f /tmp/values-override.yaml
          # Pipeline performance fix: Revert if needed.

          REVISION=$(helm status "soba-test" -n "${NAMESPACE}" -o json | jq -r '.version')
          oc get jobs -n "${NAMESPACE}" -o name \
            | grep "soba-test-migrate-" \
            | grep -v -- "-migrate-${REVISION}$" \
            | xargs -r oc delete -n "${NAMESPACE}" 2>/dev/null || true

          echo "Waiting for backend rollout..."
          oc rollout status deployment/soba-test-backend -n "${NAMESPACE}" --timeout=300s

          echo "Waiting for frontend rollout..."
          oc rollout status deployment/soba-test-frontend -n "${NAMESPACE}" --timeout=300s

          echo "Waiting for formio rollout..."
          oc rollout status deployment/soba-test-formio -n "${NAMESPACE}" --timeout=300s

          echo "Waiting for mongodb rollout..."
          oc rollout status statefulset/soba-test-mongodb -n "${NAMESPACE}" --timeout=300s

      # Pipeline performance fix: Revert if needed.
      - name: Deployment diagnostics
        if: failure()
        uses: ./.github/actions/openshift-diagnostics
        with:
          release: soba-test
          namespace: ${{ secrets.OC_NAMESPACE }}
          database_secret_name: ${{ steps.db.outputs.secret_name }}
      # Pipeline performance fix: Revert if needed.

  Tests:
    name: Integration Tests
    needs: [deploy, set-vars]
    uses: ./.github/workflows/playwright.yaml
    with:
      DEP_ENV: test
      pr_branch: ${{ needs.set-vars.outputs.ref }}
    secrets:
      Username: ${{ secrets.keycloakUsername }}
      Password: ${{ secrets.keycloakPassword }}
      MFA_CODE: ${{ secrets.MFA_CODE }}
