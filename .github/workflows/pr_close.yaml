# PR close: remove SOBA release (and secrets/PVCs) first, then Crunchy PR user/database.
# Runs on PR close or manually with a PR number.
name: PR Close
run-name: Cleanup PR-${{ github.event.pull_request.number || github.event.inputs.pr_number }}

on:
  pull_request:
    types: [closed]
    branches:
      - develop
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/pr_open.yaml"
      - ".github/workflows/pr_close.yaml"
      - ".github/workflows/build-images.yaml"
      - ".gitignore"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "deployments/**"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to clean up (e.g. 42)"
        required: true
        type: number

permissions: {}

env:
  # Sourced from the repo variable shared with pr_open.yaml so the slot
  # (PR_NUM % SLOT_COUNT) and release name resolve to the same environment this PR
  # was deployed to; the literal is a fallback if the variable is unset.
  SLOT_COUNT: ${{ vars.SLOT_COUNT || '20' }}

concurrency:
  group: openshift-deploy
  cancel-in-progress: false

jobs:
  set-vars:
    name: Set variables
    runs-on: ubuntu-latest
    outputs:
      PR_NUM: ${{ steps.vars.outputs.PR_NUM }}
      SLOT: ${{ steps.vars.outputs.SLOT }}
      JOB_NAME: ${{ steps.vars.outputs.JOB_NAME }}
      RELEASE: ${{ steps.vars.outputs.RELEASE }}
    steps:
      - name: Setting variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUM="${{ github.event.inputs.pr_number }}"
          else
            PR_NUM="${{ github.event.pull_request.number }}"
          fi
          SLOT=$(( PR_NUM % SLOT_COUNT ))
          echo "PR_NUM=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "SLOT=$SLOT" >> "$GITHUB_OUTPUT"
          echo "JOB_NAME=pr-slot-$SLOT" >> "$GITHUB_OUTPUT"
          echo "RELEASE=soba-pr-slot-$SLOT" >> "$GITHUB_OUTPUT"

  soba-cleanup:
    name: Uninstall SOBA and remove secrets/PVCs
    needs: [set-vars]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4.14"
          skip_cache: "true"

      - name: Login to OpenShift Cluster
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ vars.OC_SERVER }}
          openshift_token: ${{ secrets.OC_TOKEN }}
          insecure_skip_tls_verify: true
          namespace: ${{ secrets.OC_NAMESPACE }}

      - name: Delete Temporal PR namespace
        env:
          NAMESPACE: ${{ secrets.OC_NAMESPACE }}
          PR_NUM: ${{ needs.set-vars.outputs.PR_NUM }}
        run: |
          TEMPORAL_NS="soba-pr-${PR_NUM}"
          if oc get deployment temporal-admintools -n "${NAMESPACE}" &>/dev/null; then
            oc exec deployment/temporal-admintools -n "${NAMESPACE}" -- \
              temporal operator namespace delete -n "${TEMPORAL_NS}" --yes 2>/dev/null || true
          fi

      - name: Uninstall SOBA and delete orphaned resources
        env:
          RELEASE: ${{ needs.set-vars.outputs.RELEASE }}
          NAMESPACE: ${{ secrets.OC_NAMESPACE }}
          PR_NUM: ${{ needs.set-vars.outputs.PR_NUM }}
        run: |
          LABEL="app.kubernetes.io/instance=${RELEASE}"

          if ! helm status "${RELEASE}" -n "${NAMESPACE}" &>/dev/null; then
            echo "Release ${RELEASE} not found, nothing to clean up."
            exit 0
          fi

          # Slots are reused across PRs (PR_NUM % SLOT_COUNT). Only tear the slot down
          # if this PR still owns it — a newer PR may have redeployed over it. An empty
          # owner means the release predates slot tracking, so treat it as ours.
          OWNER=$(helm get values "${RELEASE}" -n "${NAMESPACE}" -o json 2>/dev/null | jq -r '.global.prNumber // empty')
          if [ -n "${OWNER}" ] && [ "${OWNER}" != "${PR_NUM}" ]; then
            echo "Slot ${RELEASE} is now owned by PR ${OWNER}, not ${PR_NUM}; skipping teardown."
            exit 0
          fi

          echo "Uninstalling Helm release ${RELEASE}..."
          helm uninstall "${RELEASE}" --namespace "${NAMESPACE}" || true

          echo "Sweeping all resources with label ${LABEL}..."
          oc delete all,secret,pvc,configmap,serviceaccount,networkpolicy \
            -l "${LABEL}" \
            -n "${NAMESPACE}" \
            --ignore-not-found

  crunch-cleanup:
    name: Remove Crunchy PR user and database
    needs: [set-vars, soba-cleanup]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout action-crunchy
        uses: actions/checkout@v5
        with:
          repository: bcgov/action-crunchy
          ref: v2.0.0

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4.14"
          skip_cache: "true"

      - name: Login to OpenShift Cluster
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ vars.OC_SERVER }}
          openshift_token: ${{ secrets.OC_TOKEN }}
          insecure_skip_tls_verify: true
          namespace: ${{ secrets.OC_NAMESPACE }}

      - name: Remove PR user from Crunchy
        run: |
          ./scripts/user_change.sh remove "${{ needs.set-vars.outputs.PR_NUM }}" "pg-soba-crunchy"
