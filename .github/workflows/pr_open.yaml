# PR pipeline: QA (type-check, lint, unit tests), then build/deploy when app paths change.
name: PR Open
run-name: PR-${{ github.event.number }}

env:
  ACRONYM: soba

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - develop

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect deployable changes
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Filter changed paths
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590
        id: filter
        with:
          filters: |
            deploy:
              - 'backend/**'
              - 'frontend/**'
              - '.github/workflows/pr_open.yaml'
              - '.github/workflows/build-images.yaml'
              - '.github/workflows/qa.yaml'
              - '.gitignore'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'deployments/**'

  qa:
    name: QA
    uses: ./.github/workflows/qa.yaml
    permissions:
      contents: read

  set-vars:
    name: Set variables
    runs-on: ubuntu-latest
    needs: [qa, changes]
    if: ${{ needs.changes.outputs.deploy == 'true' && !startsWith(github.head_ref, 'release/') && github.head_ref != 'main' }}
    outputs:
      JOB_NAME: ${{ steps.vars.outputs.JOB_NAME }}
      URL: ${{ steps.vars.outputs.URL }}
      ref: ${{ steps.vars.outputs.ref }}
      PR_NUM: ${{ steps.vars.outputs.PR_NUM }}
    steps:
      - name: Setting variables
        id: vars
        run: |
          PR_NUMBER="${{ github.event.number }}"
          echo "PR_NUM=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "JOB_NAME=pr-$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "URL=https://soba-pr-${PR_NUMBER}.${{ vars.OC_DOMAIN }}" >> "$GITHUB_OUTPUT"
          echo "ref=refs/pull/$PR_NUMBER/head" >> "$GITHUB_OUTPUT"

  build:
    name: Build & Push
    uses: ./.github/workflows/build-images.yaml
    needs: [set-vars]
    with:
      ref: ${{ needs.set-vars.outputs.ref }}
      platforms: amd64
      image_version: pr-${{ needs.set-vars.outputs.PR_NUM }}
      #base_path: /pr-${{ needs.set-vars.outputs.PR_NUM }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

  deploy-crunchy:
    name: Deploy Crunchy Postgres
    needs: [set-vars]
    runs-on: ubuntu-latest
    outputs:
      cluster: ${{ steps.crunchy.outputs.cluster }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.set-vars.outputs.ref }}

      - name: Deploy Crunchy (add PR user)
        id: crunchy
        uses: bcgov/action-crunchy@v2.0.0
        with:
          oc_namespace: ${{ secrets.OC_NAMESPACE }}
          oc_token: ${{ secrets.OC_TOKEN }}
          values_file: deployments/helm/action-crunchy/values.yml
          release_name: pg-soba
          ref: v2.0.0

  deploy:
    name: Deploy SOBA
    needs: [set-vars, build, deploy-crunchy]
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: pr
      url: ${{ needs.set-vars.outputs.URL }}
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - name: Checkout repository from pull request
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.set-vars.outputs.ref }}

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4.14"

      - name: Login to OpenShift Cluster
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ vars.OC_SERVER }}
          openshift_token: ${{ secrets.OC_TOKEN }}
          insecure_skip_tls_verify: true
          namespace: ${{ secrets.OC_NAMESPACE }}

      - name: Deploy shared Temporal and ensure PR namespace
        uses: ./.github/actions/temporal-deploy
        with:
          namespace: ${{ secrets.OC_NAMESPACE }}
          temporal_namespace: soba-pr-${{ needs.set-vars.outputs.PR_NUM }}
          retention: "3d"
          chart_version: ${{ vars.TEMPORAL_CHART_VERSION || '0.74.0' }}

      - name: Get DB config from Crunchy secret
        id: db
        env:
          NAMESPACE: ${{ secrets.OC_NAMESPACE }}
          CLUSTER: ${{ needs.deploy-crunchy.outputs.cluster }}
          PR_NUM: ${{ needs.set-vars.outputs.PR_NUM }}
        run: |
          SECRET_NAME="${CLUSTER}-pguser-app-${PR_NUM}"
          echo "secret_name=$SECRET_NAME" >> "$GITHUB_OUTPUT"

      # Pipeline performance fix: Revert if needed.
      - name: Wait for PR database readiness
        uses: ./.github/actions/wait-for-postgres
        with:
          secret_name: ${{ steps.db.outputs.secret_name }}
          namespace: ${{ secrets.OC_NAMESPACE }}
          label: PR database
      # Pipeline performance fix: Revert if needed.

      - name: Generate values override and deploy
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          NAMESPACE: ${{ secrets.OC_NAMESPACE }}
          RELEASE: soba-${{ needs.set-vars.outputs.JOB_NAME }}
          TAG: sha-${{ needs.build.outputs.short_sha }}
          DOMAIN: ${{ vars.OC_DOMAIN }}
          PR_NUM: ${{ needs.set-vars.outputs.PR_NUM }}
        run: |
          # Pipeline performance fix: Revert if needed.
          # TEMP DEPLOY LOGGING START: remove this block after debugging PR deploy failures.
          # Original:
          # set -euo pipefail
          set -Eeuo pipefail

          PHASE="initializing deploy"

          log() {
            echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] ${*}"
          }

          diagnose_failure() {
            exit_code=$?
            log "::error::Deploy SOBA failed during phase: ${PHASE} (exit code: ${exit_code})"
            log "Release=${RELEASE} PR=${PR_NUM} Tag=${TAG} Domain=${DOMAIN}"

            echo "::group::Helm release status"
            helm status "${RELEASE}" -n "${NAMESPACE}" || true
            echo "::endgroup::"

            echo "::group::Helm release history"
            helm history "${RELEASE}" -n "${NAMESPACE}" || true
            echo "::endgroup::"

            echo "::group::Recent OpenShift events"
            oc get events -n "${NAMESPACE}" --sort-by=.lastTimestamp | tail -n 80 || true
            echo "::endgroup::"

            echo "::group::Release resources"
            oc get all,pvc,secret,configmap -n "${NAMESPACE}" -l "app.kubernetes.io/instance=${RELEASE}" || true
            echo "::endgroup::"

            exit "${exit_code}"
          }

          trap diagnose_failure ERR

          log "Starting Deploy SOBA for release ${RELEASE} using image tag ${TAG}."
          # TEMP DEPLOY LOGGING END

          PHASE="normalizing repository name"
          REPO_LC=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')

          # TEMP DEPLOY LOGGING START: phase marker for override generation.
          PHASE="generating Helm values override"
          log "Generating Helm values override."
          # TEMP DEPLOY LOGGING END
          cat > /tmp/values-override.yaml <<OVERRIDE
          backend:
            image:
              repository: "ghcr.io/${REPO_LC}/backend"
              tag: "${TAG}"
            config:
              corsOrigin: "https://soba-pr-${PR_NUM}.${DOMAIN}"
          frontend:
            image:
              repository: "ghcr.io/${REPO_LC}/frontend"
              tag: "${TAG}"
          temporalWorker:
            image:
              repository: "ghcr.io/${REPO_LC}/temporal-worker"
              tag: "${TAG}"
          global:
            domain: "${DOMAIN}"
            routeHost: "soba-pr-${PR_NUM}.${DOMAIN}"
            routePath: ""
          database:
            existingSecretName: "${{ steps.db.outputs.secret_name }}"
            existingSecretKey: "uri"
          temporal:
            address: "temporal-frontend.${NAMESPACE}.svc.cluster.local:7233"
            namespace: "soba-pr-${PR_NUM}"

          OVERRIDE

          # TEMP DEPLOY LOGGING START: print generated override with secret name masked.
          log "Generated values override:"
          sed -e 's/existingSecretName: .*/existingSecretName: "***"/' /tmp/values-override.yaml
          # TEMP DEPLOY LOGGING END

          # Pipeline performance fix: Revert if needed.
          # TEMP DEPLOY LOGGING START: phase marker for Helm deploy.
          PHASE="running helm upgrade/install"
          log "Running helm upgrade --install for ${RELEASE}."
          # TEMP DEPLOY LOGGING END
          helm upgrade --install "${RELEASE}" ./deployments/helm/soba \
            --namespace "${NAMESPACE}" \
            --wait \
            --wait-for-jobs \
            --timeout 660s \
            -f deployments/helm/soba/values-pr.yaml \
            -f /tmp/values-override.yaml
          # Pipeline performance fix: Revert if needed.

          # TEMP DEPLOY LOGGING START: phase marker for Helm revision lookup.
          PHASE="reading Helm revision"
          log "Reading deployed Helm revision."
          # TEMP DEPLOY LOGGING END
          REVISION=$(helm status "${RELEASE}" -n "${NAMESPACE}" -o json | jq -r '.version')
          # TEMP DEPLOY LOGGING START: revision logging.
          log "Helm release ${RELEASE} is at revision ${REVISION}."
          # TEMP DEPLOY LOGGING END

          # TEMP DEPLOY LOGGING START: phase marker for migration cleanup.
          PHASE="cleaning old migration jobs"
          log "Cleaning old migration jobs for ${RELEASE}, keeping revision ${REVISION}."
          # TEMP DEPLOY LOGGING END
          # Clean up old migration jobs and keep only current revision
          oc get jobs -n "${NAMESPACE}" -o name \
            | grep "${RELEASE}-migrate-" \
            | grep -v -- "-migrate-${REVISION}$" \
            | xargs -r oc delete -n "${NAMESPACE}" 2>/dev/null || true

          # TEMP DEPLOY LOGGING START: phase marker for rollout waits.
          PHASE="waiting for application rollouts"
          # TEMP DEPLOY LOGGING END
          for rollout in \
            "deployment/${RELEASE}-backend:backend" \
            "deployment/${RELEASE}-frontend:frontend" \
            "deployment/${RELEASE}-formio:formio" \
            "deployment/${RELEASE}-temporal-worker" \
            "statefulset/${RELEASE}-mongodb:mongodb"; do
            resource="${rollout%%:*}"
            label="${rollout##*:}"
            # TEMP DEPLOY LOGGING START: richer per-rollout logging and diagnostics.
            PHASE="waiting for ${label} rollout (${resource})"
            # Original:
            # echo "Waiting for ${label} rollout..."
            # oc rollout status "${resource}" -n "${NAMESPACE}" --timeout=300s
            log "Waiting for ${label} rollout (${resource})."
            if ! oc rollout status "${resource}" -n "${NAMESPACE}" --timeout=300s; then
              log "::error::${label} rollout failed or timed out."
              echo "::group::Describe ${resource}"
              oc describe "${resource}" -n "${NAMESPACE}" || true
              echo "::endgroup::"
              echo "::group::Pods for ${label}"
              oc get pods -n "${NAMESPACE}" -l "app.kubernetes.io/instance=${RELEASE}" -o wide || true
              echo "::endgroup::"
              exit 1
            fi
            # TEMP DEPLOY LOGGING END
          done

          # TEMP DEPLOY LOGGING START: successful completion marker.
          PHASE="completed deploy"
          log "Deploy SOBA completed successfully for ${RELEASE}."
          # TEMP DEPLOY LOGGING END

      # Pipeline performance fix: Revert if needed.
      # Temporarily disabled openshift diagnostics; uncomment to restore.
      # - name: Deployment diagnostics
      #   if: failure()
      #   uses: ./.github/actions/openshift-diagnostics
      #   with:
      #     release: soba-${{ needs.set-vars.outputs.JOB_NAME }}
      #     namespace: ${{ secrets.OC_NAMESPACE }}
      #     database_secret_name: ${{ steps.db.outputs.secret_name }}
      # Pipeline performance fix: Revert if needed.

      - name: Release Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: success()
        with:
          header: release
          hide_and_recreate: true
          hide_classify: "OUTDATED"
          message: |
            Release ${{ github.sha }} deployed at <${{ needs.set-vars.outputs.URL }}>
          number: ${{ needs.set-vars.outputs.PR_NUM }}

  Tests:
    name: Integration Tests
    needs: [deploy, set-vars]
    uses: ./.github/workflows/playwright.yaml
    with:
      DEP_ENV: ${{ github.event.number }} #Passes PR number
      pr_branch: ${{ needs.set-vars.outputs.ref }} # Passes the PR branch
      BASE_URL: ${{ needs.set-vars.outputs.URL }}
    secrets:
      Username: ${{ secrets.keycloakUsername }}
      Password: ${{ secrets.keycloakPassword }}
      MFA_CODE: ${{ secrets.MFA_CODE }}
