---
name: Deploy to UAT
run-name: Deploy main ${{ github.sha }} to UAT

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy-to-uat.yaml"
      - ".github/workflows/build-images.yaml"
      - "deployments/helm/soba/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  pull_request:
    branches: [main]
    types: [opened, reopened]
  workflow_dispatch:

permissions: {}

concurrency:
  group: soba-uat
  cancel-in-progress: false

jobs:
  build:
    name: Build application images once
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.head.ref == 'feat/CCP-4817-Deploy-UAT' &&
      !contains(github.event.pull_request.labels.*.name, 'deploy-uat-db'))
    uses: ./.github/workflows/build-images.yaml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
      platforms: amd64
      image_version: uat-${{ github.event.pull_request.head.sha || github.sha }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

  deploy:
    name: Verify databases and deploy SOBA to UAT
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    environment:
      name: uat
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4.14"

      - name: Login to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ vars.OC_SERVER }}
          openshift_token: ${{ secrets.OC_TOKEN }}
          insecure_skip_tls_verify: true
          namespace: ${{ secrets.OC_NAMESPACE }}

      - name: Apply UAT GitHub Secret Bridge
        env:
          NAMESPACE: ${{ secrets.OC_NAMESPACE }}
          FORMIO_ADMIN_PASSWORD: ${{ secrets.FORMIO_ADMIN_PASSWORD }}
          FORMIO_JWT_SECRET: ${{ secrets.FORMIO_JWT_SECRET }}
          MONGODB_FORMIO_URI: ${{ secrets.MONGODB_FORMIO_URI }}
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          trap 'rm -rf "$secret_dir"' EXIT

          printf '%s' 'formio@soba.gov.bc.ca' > "$secret_dir/PLUGIN_FORMIO_V5_ADMIN_USERNAME"
          printf '%s' "$FORMIO_ADMIN_PASSWORD" > "$secret_dir/PLUGIN_FORMIO_V5_ADMIN_PASSWORD"
          printf '%s' 'formio@soba.gov.bc.ca' > "$secret_dir/ROOT_EMAIL"
          printf '%s' "$FORMIO_ADMIN_PASSWORD" > "$secret_dir/ROOT_PASSWORD"
          printf '%s' "$FORMIO_JWT_SECRET" > "$secret_dir/FORMIO_JWT_SECRET"
          jq -cn \
            --arg mongo "$MONGODB_FORMIO_URI" \
            --arg jwt "$FORMIO_JWT_SECRET" \
            '{mongo: $mongo, port: 3001, jwt: {secret: $jwt}, reservedForms: ["submissions", "submission", "exists", "export", "role", "current", "logout", "import", "form", "access", "health"]}' \
            > "$secret_dir/NODE_CONFIG"

          oc -n "$NAMESPACE" create secret generic soba-uat-formio-github-runtime \
            --from-file="$secret_dir/PLUGIN_FORMIO_V5_ADMIN_USERNAME" \
            --from-file="$secret_dir/PLUGIN_FORMIO_V5_ADMIN_PASSWORD" \
            --from-file="$secret_dir/ROOT_EMAIL" \
            --from-file="$secret_dir/ROOT_PASSWORD" \
            --from-file="$secret_dir/FORMIO_JWT_SECRET" \
            --from-file="$secret_dir/NODE_CONFIG" \
            --dry-run=client -o yaml \
            | oc -n "$NAMESPACE" apply -f -

      - name: Verify separately managed databases
        env:
          NAMESPACE: ${{ secrets.OC_NAMESPACE }}
        run: |
          set -euo pipefail

          helm status pg-soba --namespace "$NAMESPACE" >/dev/null
          PG_DATABASE_PODS="$(oc -n "$NAMESPACE" get pods \
            -l 'postgres-operator.crunchydata.com/cluster=pg-soba-crunchy,postgres-operator.crunchydata.com/data=postgres' \
            -o jsonpath='{range .items[*]}{.status.phase}{" "}{range .status.containerStatuses[*]}{.ready}{","}{end}{"\n"}{end}')"
          test "$(printf '%s\n' "$PG_DATABASE_PODS" | grep -Ec '^Running true,true,true,$')" = "3"
          oc -n "$NAMESPACE" get secret pg-soba-crunchy-pguser-app >/dev/null

          helm status soba-uat-mongodb --namespace "$NAMESPACE" >/dev/null
          MONGO_DESIRED="$(oc -n "$NAMESPACE" get statefulset soba-uat-mongodb -o jsonpath='{.spec.replicas}')"
          MONGO_READY="$(oc -n "$NAMESPACE" get statefulset soba-uat-mongodb -o jsonpath='{.status.readyReplicas}')"
          test "$MONGO_DESIRED" = "3"
          test "$MONGO_READY" = "$MONGO_DESIRED"
          oc -n "$NAMESPACE" rollout status statefulset/soba-uat-mongodb --timeout=30s
          oc -n "$NAMESPACE" get secret soba-uat-mongodb-ca >/dev/null
          oc -n "$NAMESPACE" get secret soba-uat-formio-github-runtime >/dev/null

      - name: Create immutable interim UAT source tag
        env:
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            TAG="uat-pr-${PR_NUMBER}-${SHORT_SHA}"
          else
            TAG="uat-${SHORT_SHA}"
          fi
          COMMIT="$(git rev-parse HEAD)"
          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            test "$(git rev-list -n 1 "${TAG}")" = "$COMMIT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$COMMIT" -m "UAT candidate for ${COMMIT}"
          git push origin "refs/tags/${TAG}"

      - name: Render and deploy SOBA to UAT
        env:
          NAMESPACE: ${{ secrets.OC_NAMESPACE }}
          DOMAIN: ${{ vars.OC_DOMAIN }}
          REPOSITORY: ${{ github.repository }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          FORMIO_HELM_SECRET: soba-uat-formio
          FORMIO_RUNTIME_SECRET: soba-uat-formio-github-runtime
        run: |
          set -euo pipefail
          REPO_LC="$(echo "$REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            TAG="uat-pr-${PR_NUMBER}-${SHORT_SHA}"
          else
            TAG="uat-${SHORT_SHA}"
          fi

          cat > /tmp/values-override.yaml <<EOF
          global:
            domain: "${DOMAIN}"
          backend:
            image:
              repository: "ghcr.io/${REPO_LC}/backend"
              tag: "sha-${SHORT_SHA}"
            config:
              gitSha: "${GITHUB_SHA}"
              gitTag: "${TAG}"
              imageTag: "sha-${SHORT_SHA}"
          frontend:
            image:
              repository: "ghcr.io/${REPO_LC}/frontend"
              tag: "sha-${SHORT_SHA}"
          temporalWorker:
            image:
              repository: "ghcr.io/${REPO_LC}/temporal-worker"
              tag: "sha-${SHORT_SHA}"
          EOF

          helm lint deployments/helm/soba \
            --values deployments/helm/soba/values-uat.yaml \
            --values /tmp/values-override.yaml
          helm upgrade --install soba-uat deployments/helm/soba \
            --namespace "$NAMESPACE" \
            --values deployments/helm/soba/values-uat.yaml \
            --values /tmp/values-override.yaml \
            --post-renderer "$GITHUB_WORKSPACE/deployments/helm/soba-uat-github-secrets/post-render.rb" \
            --wait \
            --wait-for-jobs \
            --timeout 15m \
            --history-max 10

      - name: Confirm application rollouts
        env:
          NAMESPACE: ${{ secrets.OC_NAMESPACE }}
        run: |
          set -euo pipefail
          oc -n "$NAMESPACE" rollout status deployment/soba-uat-backend --timeout=300s
          oc -n "$NAMESPACE" rollout status deployment/soba-uat-frontend --timeout=300s
          oc -n "$NAMESPACE" rollout status deployment/soba-uat-formio --timeout=300s
