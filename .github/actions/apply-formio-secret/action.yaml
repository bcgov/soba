# Pipeline performance fix: Revert if needed.
name: Apply Form.io Secret
description: Create or update the release Form.io secret from GitHub secrets without writing secret values into Helm override files.

inputs:
  release:
    description: Helm release name whose Form.io secret should be managed.
    required: true
  namespace:
    description: OpenShift namespace where the secret should exist.
    required: true
  admin_password:
    description: Form.io admin password.
    required: true
  jwt_secret:
    description: Form.io JWT secret.
    required: true
  admin_email:
    description: Form.io admin email.
    required: false
    default: formio@soba.gov.bc.ca
  formio_port:
    description: Form.io container port used in NODE_CONFIG.
    required: false
    default: "3001"
  mongodb_port:
    description: MongoDB service port used in NODE_CONFIG.
    required: false
    default: "27017"

runs:
  using: composite
  steps:
    - name: Apply Form.io secret
      shell: bash
      env:
        RELEASE: ${{ inputs.release }}
        NAMESPACE: ${{ inputs.namespace }}
        FORMIO_ADMIN_PASSWORD: ${{ inputs.admin_password }}
        FORMIO_JWT_SECRET: ${{ inputs.jwt_secret }}
        FORMIO_ADMIN_EMAIL: ${{ inputs.admin_email }}
        FORMIO_PORT: ${{ inputs.formio_port }}
        MONGODB_PORT: ${{ inputs.mongodb_port }}
      run: |
        set -euo pipefail

        SECRET_NAME="${RELEASE}-formio"
        MONGODB_URI="mongodb://${RELEASE}-mongodb:${MONGODB_PORT}/formio-ce"
        NODE_CONFIG=$(
          jq -nc \
            --arg mongo "$MONGODB_URI" \
            --argjson port "$FORMIO_PORT" \
            --arg secret "$FORMIO_JWT_SECRET" \
            '{
              mongo: $mongo,
              port: $port,
              jwt: { secret: $secret },
              reservedForms: [
                "submissions",
                "submission",
                "exists",
                "export",
                "role",
                "current",
                "logout",
                "import",
                "form",
                "access",
                "health"
              ]
            }'
        )

        jq -nc \
          --arg name "$SECRET_NAME" \
          --arg release "$RELEASE" \
          --arg namespace "$NAMESPACE" \
          --arg admin_email "$FORMIO_ADMIN_EMAIL" \
          --arg admin_password "$FORMIO_ADMIN_PASSWORD" \
          --arg jwt_secret "$FORMIO_JWT_SECRET" \
          --arg node_config "$NODE_CONFIG" \
          '{
            apiVersion: "v1",
            kind: "Secret",
            metadata: {
              name: $name,
              labels: {
                "app.kubernetes.io/managed-by": "Helm",
                "app.kubernetes.io/instance": $release,
                "app.kubernetes.io/component": "formio"
              },
              annotations: {
                "meta.helm.sh/release-name": $release,
                "meta.helm.sh/release-namespace": $namespace,
                "helm.sh/resource-policy": "keep"
              }
            },
            type: "Opaque",
            stringData: {
              PLUGIN_FORMIO_V5_ADMIN_USERNAME: $admin_email,
              PLUGIN_FORMIO_V5_ADMIN_PASSWORD: $admin_password,
              ROOT_EMAIL: $admin_email,
              ROOT_PASSWORD: $admin_password,
              FORMIO_JWT_SECRET: $jwt_secret,
              NODE_CONFIG: $node_config
            }
          }' | oc apply -n "$NAMESPACE" -f -
# Pipeline performance fix: Revert if needed.
