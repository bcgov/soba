name: Deploy to Environment
description: Deploys app via Helm (bcgov/soba chart) to an OpenShift namespace

inputs:
  environment:
    description: Target environment (dev, test, prod) — used for values file selection
    required: true
  job_name:
    description: Job/Instance name (master or pr-{N})
    required: true
  oc_namespace:
    description: Full OpenShift namespace (e.g., abc123-dev)
    required: true
  oc_token:
    description: OpenShift Service Account Token
    required: true
  oc_server:
    description: OpenShift API Endpoint — override via OC_SERVER GitHub Variable
    required: false
    default: https://api.silver.devops.gov.bc.ca:6443
  ref:
    description: The checkout ref id
    required: false
    default: ""
  keycloak_url:
    description: Keycloak base URL
    required: true
  jwks_uri:
    description: JWKS URI for token verification
    required: true
  formio_base_url:
    description: Formio base URL
    required: true
  jwt_secret:
    description: JWT signing secret
    required: true
  session_secret:
    description: Session secret
    required: true
  formio_admin_password:
    description: Formio admin password
    required: true
  formio_manager_password:
    description: Formio manager password
    required: true
  formio_manager_username:
    description: Formio manager username
    required: true

runs:
  using: composite
  steps:
    - name: Install OpenShift CLI
      uses: redhat-actions/openshift-tools-installer@v1
      with:
        oc: "4.14"

    - name: Checkout repository from pull request
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
      if: ${{ inputs.ref != '' }}
    - name: Checkout repository
      uses: actions/checkout@v4
      if: ${{ inputs.ref == '' }}

    - name: Login to OpenShift Cluster
      uses: redhat-actions/oc-login@v1
      with:
        openshift_server_url: ${{ inputs.oc_server }}
        openshift_token: ${{ inputs.oc_token }}
        insecure_skip_tls_verify: true
        namespace: ${{ inputs.oc_namespace }}

    - name: Add Helm Repo
      shell: bash
      run: |
        helm repo add bcgov ${{ vars.HELM_REPO_URL }}
        helm repo update

    - name: Deploy App
      shell: bash
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        RELEASE="soba-${{ inputs.job_name }}"
        NAMESPACE="${{ inputs.oc_namespace }}"
        TAG="sha-$(git rev-parse --short HEAD)"
        PR_NUM=$(echo "${{ inputs.job_name }}" | sed 's/pr-//')
        DOMAIN="${{ vars.OC_DOMAIN }}"
        HOST_FE="soba-pr-${PR_NUM}.${DOMAIN}"
        HOST_BE="soba-pr-${PR_NUM}-be.${DOMAIN}"
        REPO_LC=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')

        cat > /tmp/values-override.yaml <<EOF
        be_image:
          repository: "ghcr.io/${REPO_LC}/backend"
          tag: "${TAG}"
        fe_image:
          repository: "ghcr.io/${REPO_LC}/frontend"
          tag: "${TAG}"
        sobaBEUrl: "https://${HOST_BE}"
        keycloakUrl: "${{ inputs.keycloak_url }}"
        jwksUri: "${{ inputs.jwks_uri }}"
        formioBaseUrl: "${{ inputs.formio_base_url }}"
        jwtSecret: "${{ inputs.jwt_secret }}"
        sessionSecret: "${{ inputs.session_secret }}"
        formio:
          password: "${{ inputs.formio_admin_password }}"
        formioManagerPassword: "${{ inputs.formio_manager_password }}"
        formioManagerUsername: "${{ inputs.formio_manager_username }}"
        fe_routes:
          - host: "${HOST_FE}"
            service: "${RELEASE}-fe"
            targetPort: 3000
            wildcardPolicy: None
            tls:
              termination: edge
              insecureEdgeTerminationPolicy: Redirect
        be_routes:
          - host: "${HOST_BE}"
            service: "${RELEASE}-be"
            targetPort: 4000
            wildcardPolicy: None
            tls:
              termination: edge
              insecureEdgeTerminationPolicy: Redirect
        EOF

        helm upgrade --install "${RELEASE}" bcgov/soba \
          --namespace "${NAMESPACE}" \
          -f deployment/helm/values-pr.yaml \
          -f /tmp/values-override.yaml \
          --wait --timeout 300s
