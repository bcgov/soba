name: Wait for Postgres
description: Wait until a Postgres connection URI can authenticate and run a simple query.

inputs:
  secret_name:
    description: Existing Kubernetes secret that contains the Postgres connection URI.
    required: true
  secret_key:
    description: Secret key that stores the Postgres connection URI.
    required: false
    default: uri
  namespace:
    description: OpenShift namespace where the readiness Job should run.
    required: true
  label:
    description: Human-readable database label for logs.
    required: false
    default: database
  attempts:
    description: Number of readiness attempts.
    required: false
    default: "60"
  sleep_seconds:
    description: Seconds to wait between attempts.
    required: false
    default: "5"
  image:
    description: Container image with pg_isready and psql.
    required: false
    default: postgres:16-alpine

runs:
  using: composite
  steps:
    - name: Check Postgres readiness
      shell: bash
      env:
        SECRET_NAME: ${{ inputs.secret_name }}
        SECRET_KEY: ${{ inputs.secret_key }}
        NAMESPACE: ${{ inputs.namespace }}
        LABEL: ${{ inputs.label }}
        ATTEMPTS: ${{ inputs.attempts }}
        SLEEP_SECONDS: ${{ inputs.sleep_seconds }}
        IMAGE: ${{ inputs.image }}
      run: |
        RUN_ID="${GITHUB_RUN_ID:-manual}"
        RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT:-1}"
        JOB_NAME="pg-readiness-${RUN_ID}-${RUN_ATTEMPT}"
        ACTIVE_DEADLINE_SECONDS=$((ATTEMPTS * SLEEP_SECONDS + 60))
        WAIT_TIMEOUT="$((ACTIVE_DEADLINE_SECONDS + 30))s"
        READINESS_SCRIPT='echo "Waiting for ${LABEL} to accept queries..."
        for attempt in $(seq 1 "${ATTEMPTS}"); do
          if pg_isready -d "${DATABASE_URI}" >/dev/null 2>&1 &&
            psql "${DATABASE_URI}" -v ON_ERROR_STOP=1 -c "SELECT 1;" >/dev/null 2>&1; then
            echo "${LABEL} is ready after ${attempt} attempt(s)."
            exit 0
          fi

          sleep "${SLEEP_SECONDS}"
        done

        echo "${LABEL} did not become ready after ${ATTEMPTS} attempt(s)."
        exit 1'

        cleanup() {
          oc delete job "$JOB_NAME" -n "$NAMESPACE" --ignore-not-found=true >/dev/null 2>&1 || true
        }
        trap cleanup EXIT

        cleanup

        echo "Creating in-cluster readiness check for ${LABEL}..."
        jq -n \
          --arg job_name "$JOB_NAME" \
          --arg image "$IMAGE" \
          --arg secret_name "$SECRET_NAME" \
          --arg secret_key "$SECRET_KEY" \
          --arg label "$LABEL" \
          --arg attempts "$ATTEMPTS" \
          --arg sleep_seconds "$SLEEP_SECONDS" \
          --arg readiness_script "$READINESS_SCRIPT" \
          --argjson active_deadline_seconds "$ACTIVE_DEADLINE_SECONDS" \
          '{
            apiVersion: "batch/v1",
            kind: "Job",
            metadata: {
              name: $job_name,
              labels: {
                "app.kubernetes.io/component": "postgres-readiness"
              }
            },
            spec: {
              backoffLimit: 0,
              activeDeadlineSeconds: $active_deadline_seconds,
              template: {
                metadata: {
                  labels: {
                    "app.kubernetes.io/component": "postgres-readiness"
                  }
                },
                spec: {
                  restartPolicy: "Never",
                  containers: [
                    {
                      name: "postgres-readiness",
                      image: $image,
                      imagePullPolicy: "IfNotPresent",
                      env: [
                        {
                          name: "DATABASE_URI",
                          valueFrom: {
                            secretKeyRef: {
                              name: $secret_name,
                              key: $secret_key
                            }
                          }
                        },
                        {
                          name: "LABEL",
                          value: $label
                        },
                        {
                          name: "ATTEMPTS",
                          value: $attempts
                        },
                        {
                          name: "SLEEP_SECONDS",
                          value: $sleep_seconds
                        }
                      ],
                      command: [
                        "sh",
                        "-c",
                        $readiness_script
                      ]
                    }
                  ]
                }
              }
            }
          }' | oc apply -n "$NAMESPACE" -f -

        if oc wait --for=condition=complete "job/${JOB_NAME}" -n "$NAMESPACE" --timeout="$WAIT_TIMEOUT"; then
          oc logs "job/${JOB_NAME}" -n "$NAMESPACE" || true
          exit 0
        fi

        echo "Readiness Job failed or timed out."
        oc describe "job/${JOB_NAME}" -n "$NAMESPACE" || true
        oc logs "job/${JOB_NAME}" -n "$NAMESPACE" || true
        exit 1
