name: OpenShift Diagnostics
description: Print Helm, OpenShift, and database diagnostics for a failed release deployment.

inputs:
  release:
    description: Helm release name to inspect.
    required: true
  namespace:
    description: OpenShift namespace to inspect.
    required: true
  database_secret_name:
    description: Optional existing Kubernetes secret that contains the Postgres connection URI.
    required: false
    default: ""
  database_secret_key:
    description: Secret key that stores the Postgres connection URI.
    required: false
    default: uri

runs:
  using: composite
  steps:
    - name: Print deployment diagnostics
      shell: bash
      env:
        RELEASE: ${{ inputs.release }}
        NAMESPACE: ${{ inputs.namespace }}
        DATABASE_SECRET_NAME: ${{ inputs.database_secret_name }}
        DATABASE_SECRET_KEY: ${{ inputs.database_secret_key }}
      run: |
        set +e
        RUN_ID="${GITHUB_RUN_ID:-manual}"
        RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT:-1}"
        JOB_NAME="pg-diagnostics-${RUN_ID}-${RUN_ATTEMPT}"

        cleanup() {
          oc delete job "$JOB_NAME" -n "$NAMESPACE" --ignore-not-found=true >/dev/null 2>&1 || true
        }
        trap cleanup EXIT

        echo "Helm status for ${RELEASE}"
        helm status "${RELEASE}" -n "${NAMESPACE}" || true

        echo "Helm history for ${RELEASE}"
        helm history "${RELEASE}" -n "${NAMESPACE}" || true

        echo "Jobs for ${RELEASE}"
        oc get jobs -n "${NAMESPACE}" -l "app.kubernetes.io/instance=${RELEASE}" -o wide || true

        echo "Pods for ${RELEASE}"
        oc get pods -n "${NAMESPACE}" -l "app.kubernetes.io/instance=${RELEASE}" -o wide || true

        echo "Migration job details for ${RELEASE}"
        for job in $(oc get jobs -n "${NAMESPACE}" -l "app.kubernetes.io/instance=${RELEASE}" -o name 2>/dev/null | grep -- "-migrate-" || true); do
          echo "Describing ${job}"
          oc describe "${job}" -n "${NAMESPACE}" || true
        done

        echo "Migration pod logs for ${RELEASE}"
        for pod in $(oc get pods -n "${NAMESPACE}" -l "app.kubernetes.io/instance=${RELEASE},app.kubernetes.io/component=migrate" -o name 2>/dev/null || true); do
          echo "Logs for ${pod}"
          oc logs "${pod}" -n "${NAMESPACE}" --all-containers=true || true
        done

        if [ -n "$DATABASE_SECRET_NAME" ]; then
          echo "Database connectivity check"
          jq -n \
            --arg job_name "$JOB_NAME" \
            --arg secret_name "$DATABASE_SECRET_NAME" \
            --arg secret_key "$DATABASE_SECRET_KEY" \
            '{
              apiVersion: "batch/v1",
              kind: "Job",
              metadata: {
                name: $job_name,
                labels: {
                  "app.kubernetes.io/component": "postgres-diagnostics"
                }
              },
              spec: {
                backoffLimit: 0,
                activeDeadlineSeconds: 120,
                template: {
                  metadata: {
                    labels: {
                      "app.kubernetes.io/component": "postgres-diagnostics"
                    }
                  },
                  spec: {
                    restartPolicy: "Never",
                    containers: [
                      {
                        name: "postgres-diagnostics",
                        image: "postgres:16-alpine",
                        imagePullPolicy: "IfNotPresent",
                        env: [
                          {
                            name: "DATABASE_URI",
                            valueFrom: {
                              secretKeyRef: {
                                name: $secret_name,
                                key: $secret_key
                              }
                            }
                          }
                        ],
                        command: [
                          "sh",
                          "-c",
                          "psql \"$DATABASE_URI\" -v ON_ERROR_STOP=1 -c \"SELECT 1;\" && psql \"$DATABASE_URI\" -v ON_ERROR_STOP=1 -c \"SELECT current_database(), current_user;\""
                        ]
                      }
                    ]
                  }
                }
              }
            }' | oc apply -n "$NAMESPACE" -f - || true

          if ! oc wait --for=condition=complete "job/${JOB_NAME}" -n "$NAMESPACE" --timeout=150s; then
            echo "Database diagnostics job failed or timed out."
            oc describe "job/${JOB_NAME}" -n "$NAMESPACE" || true
          fi
          oc logs "job/${JOB_NAME}" -n "${NAMESPACE}" || true
        fi

        echo "Recent namespace events"
        oc get events -n "${NAMESPACE}" --sort-by=.lastTimestamp | tail -100 || true
